# For durable SQLite across deploys: upgrade to a paid instance, add a persistent disk in the Render
# dashboard, and set USER_DB_PATH to the mount (e.g. /data/users.sqlite3). See README.
services:
  - type: web
    name: translate-chat-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn web_app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_VISION_API_KEY
        sync: false
      - key: GEMINI_REQUEST_TIMEOUT_SEC
        value: "600"
      - key: JWT_SECRET
        sync: false
      - key: REQUIRE_AUTH_FOR_JOBS
        value: "0"
      - key: BILLING_ENFORCE
        value: "0"
      - key: PADDLE_API_KEY
        sync: false
      - key: PADDLE_WEBHOOK_SECRET
        sync: false
      # 0 = live Paddle. Omit this key entirely if you prefer (same effect as 0).
      - key: PADDLE_SANDBOX
        value: "0"
      - key: PADDLE_PRICE_SINGLE
        sync: false
      - key: PADDLE_PRICE_DEBUG
        sync: false
      - key: PADDLE_PRICE_MONTH
        sync: false
      - key: PADDLE_PRICE_SIXMO
        sync: false
      - key: PADDLE_PRICE_YEAR
        sync: false
      - key: BILLING_SUBSCRIPTION_RUNS_PER_MONTH
        value: "7"
      # Comma-separated; matched users skip billing on jobs and see unlimited in GET /billing/me
      - key: BILLING_EXEMPT_EMAILS
        sync: false
      - key: BILLING_EXEMPT_USERNAMES
        sync: false
      - key: FRONTEND_URL
        sync: false
      # Comma-separated if multiple (e.g. prod + preview). Falls back to FRONTEND_URL only if unset.
      - key: CORS_ORIGINS
        sync: false
      # Optional error monitoring
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0"
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: FACEBOOK_APP_ID
        sync: false
      - key: FACEBOOK_APP_SECRET
        sync: false
      - key: APPLE_CLIENT_ID
        sync: false
