services:
  - type: web
    name: translate-chat-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn web_app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_VISION_API_KEY
        sync: false
      - key: GEMINI_REQUEST_TIMEOUT_SEC
        value: "600"
      - key: JWT_SECRET
        sync: false
      - key: REQUIRE_AUTH_FOR_JOBS
        value: "0"
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: FACEBOOK_APP_ID
        sync: false
      - key: FACEBOOK_APP_SECRET
        sync: false
      - key: APPLE_CLIENT_ID
        sync: false
