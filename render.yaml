# Users + billing use PostgreSQL. Set DATABASE_URL on this web service to the Internal Database URL
# from translate-chat-db (Dashboard → database → Connect). Do not commit secrets here.
services:
  - type: web
    name: translate-chat-backend
    runtime: python
    plan: free
    # Pin Python via runtime.txt (3.12.x) so torch/psycopg wheels match; 3.14 default can break hashed installs.
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn web_app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # Force 3.12.x so psycopg[binary] and torch install reliably (Render default 3.14 can skip wheels).
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_VISION_API_KEY
        sync: false
      - key: GEMINI_REQUEST_TIMEOUT_SEC
        value: "600"
      - key: JWT_SECRET
        sync: false
      - key: REQUIRE_AUTH_FOR_JOBS
        value: "0"
      - key: BILLING_ENFORCE
        value: "0"
      - key: PADDLE_API_KEY
        sync: false
      - key: PADDLE_WEBHOOK_SECRET
        sync: false
      # 0 = live Paddle. Omit this key entirely if you prefer (same effect as 0).
      - key: PADDLE_SANDBOX
        value: "0"
      - key: PADDLE_PRICE_SINGLE
        sync: false
      - key: PADDLE_PRICE_DEBUG
        sync: false
      - key: PADDLE_PRICE_MONTH
        sync: false
      - key: PADDLE_PRICE_SIXMO
        sync: false
      - key: PADDLE_PRICE_YEAR
        sync: false
      - key: BILLING_SUBSCRIPTION_RUNS_PER_MONTH
        value: "7"
      # Comma-separated; matched users skip billing on jobs and see unlimited in GET /billing/me
      - key: BILLING_EXEMPT_EMAILS
        sync: false
      - key: BILLING_EXEMPT_USERNAMES
        sync: false
      - key: FRONTEND_URL
        sync: false
      # Comma-separated if multiple (e.g. prod + preview). Falls back to FRONTEND_URL only if unset.
      - key: CORS_ORIGINS
        sync: false
      # Optional error monitoring
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0"
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: FACEBOOK_APP_ID
        sync: false
      - key: FACEBOOK_APP_SECRET
        sync: false
      - key: APPLE_CLIENT_ID
        sync: false
